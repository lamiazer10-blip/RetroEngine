name: Build Release APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CI: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No .zip file found in repo root. Upload RetroEngine-fixed.zip to the repo root first."
            exit 1
          fi
          echo "Found $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted
          if [ -d "extracted/RetroEngine" ]; then
            mv extracted/RetroEngine project
          else
            mv extracted project
          fi
          echo "Project extracted to ./project"
          ls project

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        working-directory: project
        run: npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x project/android/gradlew

      - name: Build release APK
        working-directory: project/android
        run: |
          {
            echo "===== package.json used in this run ====="
            cat ../package.json
            echo ""
            echo "===== node_modules/react-native-screens present? ====="
            if [ -d "../node_modules/react-native-screens" ]; then
              echo "YES - react-native-screens IS installed in node_modules"
              cat ../node_modules/react-native-screens/package.json | grep version
            else
              echo "NO - react-native-screens is NOT installed"
            fi
            echo ""
            echo "===== Gradle build output ====="
          } > ../../build-log.txt
          ./gradlew assembleRelease --stacktrace --console=plain 2>&1 | tee -a ../../build-log.txt
          exit ${PIPESTATUS[0]}
        shell: bash

      - name: Upload build log (always, even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: project/android/app/build/outputs/apk/release/app-release.apk
